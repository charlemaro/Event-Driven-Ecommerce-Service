version: '3.9'

services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: order-mysql
    environment:
      MYSQL_ROOT_PASSWORD: charle
      MYSQL_DATABASE: InventorySystem
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql   # data survives container restarts
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pcharle"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Zookeeper (required by Kafka) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: order-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: order-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # exposed for host-machine tools (e.g. kafka-console-consumer)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners:
      #   PLAINTEXT       → used by other containers (your Spring Boot app) via kafka:29092
      #   PLAINTEXT_HOST  → used by tools running on your host machine via localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Order Processing Service ─────────────────────────────────────────────────
  order-service:
    build: .                        # uses the Dockerfile in this directory
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      # Spring Boot maps env vars → properties automatically:
      # SPRING_DATASOURCE_URL overrides spring.datasource.url in application.yaml
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/InventorySystem
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: charle
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      # Kafka bootstrap servers — uses internal listener (kafka:29092)
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # JPA
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  mysql-data:   # named volume — outlives any container restart or 'docker compose down'