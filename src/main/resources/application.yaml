spring:
  application:
    # Changed from 'src' to a functional service name
    name: order-processing-service

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      # Ensures topics in TopicConfig.java are created on startup
      auto-create: true
      fail-fast: true

  datasource:
    # Note the lowercase 'mysql' in the driver protocol
    url: jdbc:mysql://localhost:3306/InventorySystem
    username: root
    password: charle
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 'update' is fine for development, 'validate' is safer for production
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

# Add this to enable the .setObservationEnabled(true) in your KafkaProducerConfig
management:
  tracing:
    sampling:
      probability: 1.0